events {
  worker_connections 1024;
}

http {
  # Upstream: oauth2-proxy handles auth and proxies to host.docker.internal:3000
  upstream oauth2_proxy {
    server oauth2-proxy:4180;
  }

  server {
    listen 8443 ssl;
    server_name _;

    # ── TLS (server cert) ────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Mutual TLS ───────────────────────────────────────────────────────────
    ssl_client_certificate /etc/nginx/certs/ca.crt;   # CA that signed client certs
    ssl_verify_client      on;
    ssl_verify_depth       2;

    # ── Auth subrequest via oauth2-proxy ─────────────────────────────────────
    location = /oauth2/auth {
      internal;
      proxy_pass       http://oauth2_proxy;
      proxy_set_header Host             $host;
      proxy_set_header X-Real-IP        $remote_addr;
      proxy_set_header X-Scheme         $scheme;
      proxy_set_header Content-Length   "";
      proxy_pass_request_body off;
    }

    # ── oauth2-proxy callback & static routes ────────────────────────────────
    location /oauth2/ {
      proxy_pass       http://oauth2_proxy;
      proxy_set_header Host             $host;
      proxy_set_header X-Real-IP        $remote_addr;
      proxy_set_header X-Scheme         $scheme;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # ── Main application ─────────────────────────────────────────────────────
    location / {
      auth_request /oauth2/auth;

      # On 401, redirect to oauth2-proxy sign-in
      error_page 401 = /oauth2/sign_in?rd=$scheme://$host$request_uri;

      # Forward identity headers from oauth2-proxy to the upstream app
      auth_request_set $user   $upstream_http_x_auth_request_user;
      auth_request_set $email  $upstream_http_x_auth_request_email;
      auth_request_set $token  $upstream_http_x_auth_request_access_token;

      proxy_set_header X-Forwarded-User  $user;
      proxy_set_header X-Forwarded-Email $email;
      proxy_set_header X-Forwarded-Access-Token $token;

      # Forward mTLS client cert info to the app (optional)
      proxy_set_header X-Client-Cert-DN  $ssl_client_s_dn;
      proxy_set_header X-Client-Verified $ssl_client_verify;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_pass http://oauth2_proxy;
    }
  }

  server {
    listen 9443 ssl;
    server_name _;

    ssl_certificate        /etc/nginx/certs/server.crt;
    ssl_certificate_key    /etc/nginx/certs/server.key;
    ssl_client_certificate /etc/nginx/certs/ca.crt;
    ssl_verify_client      on;

    location / {
      proxy_pass http://keycloak:9080;
      proxy_set_header Host                    $host;
      proxy_set_header X-Real-IP               $remote_addr;
      proxy_set_header X-Forwarded-For         $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto       https;

      # Pass the full PEM cert — Keycloak reads this for X.509 auth
      proxy_set_header X-SSL-Client-Cert       $ssl_client_escaped_cert;
      proxy_set_header X-SSL-Client-Verify     $ssl_client_verify;
      proxy_set_header X-SSL-Client-DN         $ssl_client_s_dn;
    }
  }
}
